spring.application.name=gestao-funcionarios

# local = log legivel no console; o docker-compose sobrescreve para "docker" (log json)
spring.profiles.active=local

spring.datasource.url=jdbc:mysql://localhost:3306/gestao_funcionarios?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# tabelas ja existem via schema.sql, nao deixa o hibernate validar/criar
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

server.port=8080

springdoc.swagger-ui.path=/swagger-ui.html

# trocar por variavel de ambiente em producao
app.jwt.secret=dixi-desafio-tecnico-chave-secreta-para-assinatura-jwt-32bytes-minimo
app.jwt.expiration-ms=3600000

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
